<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fruits Shop</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}" />
  </head>
  <body>
    <div class="container">
      <h1>Fruits Shop</h1>
      <div class="layout">
        <div class="products">
          <h2>Products</h2>
          <ul id="product-list">
            {% for product in products %}
            <li class="product-item">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" style="width:100px;">
                <div class="info">
                    <strong>{{ product.name }}</strong> - ₹{{ product.price }}
                    <button class="add-btn">Add to Bucket</button>
                </div>
            </li>
            {% empty %}
            <li>No fruits found. Check Django Admin!</li>
            {% endfor %}
          </ul>
        </div>
        
        <div class="cart">
          <h2>Bucket</h2>
          <ul id="cart-list"></ul>
          <div class="total">Total: ₹<span id="total">0.00</span></div>
          <button id="checkout">Confirm Purchase</button>
        </div>
      </div>
    </div>

    <script src="{% static 'main.js' %}"></script>
  </body>
</html>
